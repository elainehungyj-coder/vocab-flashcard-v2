<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vocab Cards">
<link rel="apple-touch-icon" href="icon-v2.png?v=3" />
<title>Vocab-Flashcard</title>
<style>
:root{--bg:#faf9f7;--card:#fff;--primary:#2d5a8a;--accent:#38a0d4;--text:#1a1a1a;--text-light:#666;--border:#e0e0e0;--success:#4caf50;--danger:#e53935;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:16px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:18px;font-weight:600;color:var(--primary)}
.book-tabs{display:flex;gap:8px;background:#f0f0f0;border-radius:10px;padding:3px}
.book-tab{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#666;transition:all .2s}
.book-tab.active{background:var(--card);color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.container{padding:16px;flex:1;display:flex;flex-direction:column;gap:16px;max-width:600px;margin:0 auto;width:100%}
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:12px;border:none;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;background:var(--primary);color:white}
.btn:active{transform:scale(0.96)}
.btn.secondary{background:#f0f0f0;color:var(--text)}
.btn.success{background:var(--success)}
.btn-block{width:100%}
.speaker-btn{width:64px;height:64px;border-radius:50%;background:var(--accent);border:none;color:white;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(56,160,212,0.4);transition:all .2s}
.speaker-btn:active{transform:scale(0.9)}
.group-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.group-card{background:var(--card);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;border:2px solid transparent;box-shadow:var(--shadow);transition:all .2s}
.group-card:active{transform:scale(0.96)}
.group-card.active{border-color:var(--accent)}
.group-card .g-num{font-size:18px;font-weight:700;color:var(--primary)}
.group-card .g-count{font-size:12px;color:var(--text-light);margin-top:4px}
.group-card .g-progress{font-size:11px;color:var(--success);margin-top:2px}
.flashcard{perspective:1000px;min-height:280px;cursor:pointer}
.flashcard-inner{position:relative;width:100%;height:100%;min-height:280px;transition:transform .5s;transform-style:preserve-3d}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.flashcard-back{transform:rotateY(180deg)}
.word-display{font-size:30px;font-weight:700;color:var(--primary);margin-bottom:6px}
.word-ipa{font-size:16px;color:var(--accent);margin-bottom:10px;font-family:SF Pro Text,Georgia,Noto Sans,Lucida Sans Unicode,serif;line-height:1.4}
.word-meaning{font-size:18px;color:var(--primary);font-weight:600;margin-bottom:12px}
.word-example{font-size:14px;color:var(--text-light);line-height:1.6;padding:12px;background:#f8f9fa;border-radius:8px;text-align:left}
.flip-hint{font-size:12px;color:#aaa;margin-top:14px}
.quiz-option{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;font-size:15px;transition:all .2s}
.quiz-option:active{transform:scale(0.98)}
.quiz-option.correct{border-color:var(--success);background:#e8f5e9}
.quiz-option.wrong{border-color:var(--danger);background:#ffebee}
.progress-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--success);border-radius:4px;transition:width .3s}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.stat-box{background:#f8f9fa;border-radius:10px;padding:12px;text-align:center}
.stat-box .stat-num{font-size:22px;font-weight:700;color:var(--primary)}
.stat-box .stat-label{font-size:11px;color:var(--text-light);margin-top:4px}
.section-title{font-size:16px;font-weight:600;margin-bottom:12px;color:var(--primary)}
.hide{display:none!important}
.flex{display:flex}
.justify-between{justify-content:space-between}
.items-center{align-items:center}
.gap-3{gap:12px}
.mt-2{margin-top:8px}
.mt-3{margin-top:12px}
.mb-3{margin-bottom:12px}
.text-center{text-align:center}
.text-sm{font-size:13px}
.text-xl{font-size:22px}
.font-bold{font-weight:700}
.text-primary{color:var(--primary)}
.text-success{color:var(--success)}
.text-danger{color:var(--danger)}
.text-light{color:var(--text-light)}
.w-full{width:100%}
.quiz-type-label{display:inline-block;background:#f0f0f0;color:var(--primary);padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:12px}
.quiz-prompt{font-size:24px;font-weight:700;color:var(--primary);margin-bottom:16px;text-align:center}
.quiz-prompt-sm{font-size:18px;color:var(--text-light);margin-bottom:16px;text-align:center}
.example-speaker{width:56px;height:56px;border-radius:50%;background:var(--accent);border:none;color:white;font-size:24px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin-right:10px;vertical-align:middle;box-shadow:0 3px 10px rgba(56,160,212,0.35);transition:all .15s}
.example-speaker:active{transform:scale(0.92)}
</style>
</head>
<body>
<header><h1>Vocab-Flashcard</h1>
<div class="book-tabs">
<button class="book-tab active" data-book="english" onclick="switchBook('english')">英語</button>
<button class="book-tab" data-book="japanese" onclick="switchBook('japanese')">日語</button>
</div>
</header>
<div class="container">
<div id="dashboard">
<div class="card">
<div class="section-title" id="book-title">英語單詞本</div>
<div class="stats-grid">
<div class="stat-box"><div class="stat-num" id="stat-total">0</div><div class="stat-label">總單詞</div></div>
<div class="stat-box"><div class="stat-num" id="stat-mastered">0</div><div class="stat-label">已掌握</div></div>
<div class="stat-box"><div class="stat-num" id="stat-groups">0</div><div class="stat-label">學習組</div></div>
</div>
<div class="mt-3"><div class="text-sm text-light">總體進度</div><div class="progress-bar mt-2"><div class="progress-fill" id="overall-progress" style="width:0%"></div></div></div>
</div>
<div class="section-title">選擇學習組</div>
<div class="group-grid" id="group-grid"></div>
</div>
<div id="learn-mode" class="hide">
<div class="card">
<div class="flex justify-between items-center mb-3">
<div class="text-sm text-light">學習組 <span id="learn-group-num">1</span></div>
<div class="text-sm text-light"><span id="learn-progress">1</span> / <span id="learn-total">6</span></div>
</div>
<div class="progress-bar mb-3"><div class="progress-fill" id="learn-progress-bar" style="width:0%"></div></div>
<div class="flex justify-center mt-3 mb-3"><button class="speaker-btn" onclick="speakCurrent()">&#x1F50A;</button></div>
<div class="flashcard" id="flashcard" onclick="flipCard()">
<div class="flashcard-inner" id="flashcard-inner">
<div class="flashcard-front">
<div class="word-display" id="card-word">word</div>
<div class="word-ipa" id="card-ipa"></div>
<div class="flip-hint">點擊翻轉查看意思與例句</div>
</div>
<div class="flashcard-back">
<div class="word-meaning" id="card-meaning"></div>
<div class="word-example" id="card-example"></div>
</div>
</div>
</div>
</div>
<div class="flex gap-3">
<button class="btn secondary btn-block" onclick="markUnknown()">&#x1F914; 不認識</button>
<button class="btn success btn-block" onclick="markKnown()">&#x2713; 認識</button>
</div>
<button class="btn btn-block mt-3" onclick="endLearn()">結束學習，進入測驗</button>
</div>
<div id="test-mode" class="hide">
<div class="card">
<div class="flex justify-between items-center mb-3">
<div class="text-sm text-light">測驗 <span id="test-group-num">1</span></div>
<div class="text-sm text-light"><span id="test-progress">1</span> / <span id="test-total">6</span></div>
</div>
<div class="progress-bar mb-3"><div class="progress-fill" id="test-progress-bar" style="width:0%"></div></div>
<div id="quiz-audio-area" class="text-center mb-3 hide"><button class="speaker-btn" onclick="speakTestPrompt()">&#x1F50A;</button><div class="quiz-prompt-sm mt-2">聽讀音，選對應單詞</div></div>
<div class="quiz-type-label" id="quiz-label"></div>
<div class="quiz-prompt" id="quiz-prompt"></div>
<div id="quiz-options"></div>
</div>
</div>
<div id="test-results" class="hide">
<div class="card text-center">
<div class="text-xl font-bold text-primary mb-2">測驗結果</div>
<div class="stats-grid">
<div class="stat-box"><div class="stat-num text-success" id="result-correct">0</div><div class="stat-label">正確</div></div>
<div class="stat-box"><div class="stat-num text-danger" id="result-wrong">0</div><div class="stat-label">錯誤</div></div>
<div class="stat-box"><div class="stat-num" id="result-rate">0%</div><div class="stat-label">正確率</div></div>
</div>
<div class="mt-3 text-sm text-light" id="result-message"></div>
</div>
<div class="card hide" id="wrong-words-card">
<div class="section-title">需要複習的單詞</div>
<div id="wrong-words-list"></div>
</div>
<button class="btn btn-block mt-3" onclick="backToDashboard()">返回學習組</button>
</div>
</div>

s mental overconsumption, so the upgrade direction evolves from body treatment into mental healing.","ipa":"","meaning":"演進"},{"word":"Kanji","example":"The kanji [白花] can be pronounced:hakka、shirohana、shirahana、shirobana、hakuka","ipa":"","meaning":"漢字"},{"word":"Correspond","example":"Hakka, shirakaba, shirakannba can also correspond to: 白華，白樺，白香 --all keep the character 白 (white) and extend the original meaning, so they work as upgraded brand names.","ipa":"","meaning":"對應"},{"word":"Hiragana","example":"Adding Japanese hiragana breaks up the boring all-Chinese-character look.","ipa":"","meaning":"平假名"},{"word":"Interpret","example":"Instead of removing the character completely, we hope to reinterpret it in a softer and more modern way.","ipa":"","meaning":"詮釋"},{"word":"Scenarios","example":"We've brainstormed products for modern daily scenarios. You can split them into separate items or combine them--adjust based on market needs.","ipa":"","meaning":"情境"},{"word":"Harmony","example":"Zen means body and mind influence each other as one. A troubled mind upsets the body, and an unbalanced body disturbs the mind--true health comes from harmony.","ipa":"","meaning":"和諧"},{"word":"Zen","example":"Zen means body and mind influence each other as one. A troubled mind upsets the body, and an unbalanced body disturbs the mind--true health comes from harmony.","ipa":"","meaning":"禪"},{"word":"Anxiety","example":"Modern people don't just suffer from physical problems like carsickness or mosquito bites, because anxiety, fatigue, and mental imbalance are much bigger issues today.","ipa":"","meaning":"焦慮"},{"word":"Fatigue","example":"Modern people don't just suffer from physical problems like carsickness or mosquito bites, because anxiety, fatigue, and mental imbalance are much bigger issues today.","ipa":"","meaning":"疲勞"},{"word":"Scene","example":"Scene one: The morning commute. That moment when you flip from sleep mode to full power.","ipa":"","meaning":"場景"},{"word":"Commute","example":"Scene one: The morning commute. That moment when you flip from sleep mode to full power.","ipa":"","meaning":"通勤"},{"word":"Mode","example":"Scene one: The morning commute. That moment when you flip from sleep mode to full power.","ipa":"","meaning":"模式"},{"word":"Associate","example":"The English words we associate with this are energy, dynamic, proactive power, lucky, money, and positive, because these express that fully-charged feeling.","ipa":"","meaning":"聯想"},{"word":"Dynamic","example":"The English words we associate with this are energy, dynamic, proactive power, lucky, money, and positive, because these express that fully-charged feeling.","ipa":"","meaning":"活力"},{"word":"Proactive","example":"The English words we associate with this are energy, dynamic, proactive power, lucky, money, and positive, because these express that fully-charged feeling.","ipa":"","meaning":"主動"},{"word":"Express","example":"The English words we associate with this are energy, dynamic, proactive power, lucky, money, and positive, because these express that fully-charged feeling.","ipa":"","meaning":"表達"},{"word":"fully-charged","example":"The English words we associate with this are energy, dynamic, proactive power, lucky, money, and positive, because these express that fully-charged feeling.","ipa":"","meaning":"充滿電力"},{"word":"Uninterrupted","example":"Deep work mode. Writing, designing, brainstorming -- when you need hours of uninterrupted focus.","ipa":"","meaning":"不受打擾"},{"word":"Mood","example":"Adjusting your mood.","ipa":"","meaning":"情緒"},{"word":"Unstable","example":"This is for moments when you feel unstable, angry, or anxious and you need to settle your emotions.","ipa":"","meaning":"不穩定"},{"word":"Anxious","example":"This is for moments when you feel unstable, angry, or anxious and you need to settle your emotions.","ipa":"","meaning":"焦慮"},{"word":"Ritual","example":"Imagine coming home from work and switching off your job mode as a daily ritual."," function pickVoice(lang){if(!_voicesReady)initVoices();var exact=_voices.find(function(v){return v.lang===lang;});if(exact)return exact;var prefix=_voices.find(function(v){return v.lang&&v.lang.startsWith(lang.split('-')[0]);});return prefix||_voices[0]||null;}

function genWordOpts(correctIdx){
  var book=getBook();
  var cw=book.words[correctIdx];
  var correctText=currentBook==='english'?cw.word:cw.word;
  var allIdx=[];
  for(var g=Math.max(0,currentGroupIdx-1);g<Math.min(book.groups.length,currentGroupIdx+2);g++)
    allIdx=allIdx.concat(book.groups[g]);
  var dist=allIdx.filter(function(i){return i!==correctIdx;}).sort(function(){return Math.random()-0.5;}).slice(0,10);
  var opts=[{text:correctText,correct:true}];
  for(var i=0;i<dist.length;i++){
    if(opts.length>=4)break;
    var w=book.words[dist[i]];
    var t=currentBook==='english'?w.word:w.word;
    if(t&&t!==correctText&&t.length>1)opts.push({text:t,correct:false});
  }
  // Fallback: if not enough, pick any random word
  if(opts.length<4){
    for(var i=0;i<book.words.length&&opts.length<4;i++){
      if(i!==correctIdx){
        var t=book.words[i].word;
        if(t&&t!==correctText)opts.push({text:t,correct:false});
      }
    }
  }
  return opts.sort(function(){return Math.random()-0.5;});
}

  if(opts.length<4){

  else{el.classList.add('wrong');testResults.wrong.push(idx);var s=prog.wordStatus[idx]||0;if(s>0)prog.wordStatus[idx]=s-1;}
  saveProgress(progress);
  setTimeout(function(){testIndex++;if(testIndex>=testQueue.length)showResults();else renderTest();},900);
}

function showResults(){
  showView('test-results');
  var c=testResults.correct.length,w=testResults.wrong.length,t=testQueue.length;
  var rate=t?Math.round(c/t*100):0;
  document.getElementById('result-correct').textContent=c;
  document.getElementById('result-wrong').textContent=w;
  document.getElementById('result-rate').textContent=rate+'%';
  var msg=rate>=90?'太棒了！這組已經掌握得差不多了。':rate>=70?'不錯！錯誤的單詞會在下一組繼續出現。':'需要加強！錯誤單詞已加入複習列表。';
  document.getElementById('result-message').textContent=msg;
  var wrongCard=document.getElementById('wrong-words-card');
  var wrongList=document.getElementById('wrong-words-list');
  if(testResults.wrong.length>0){
    wrongCard.classList.remove('hide');
    wrongList.innerHTML='';
    var book=getBook();
    testResults.wrong.forEach(function(idx){
      var w=book.words[idx];
      var div=document.createElement('div');
      div.className='mt-2';
      if(currentBook==='english'){
        div.innerHTML='<strong>'+w.word+'</strong> '+(w.ipa?'('+w.ipa+')':'')+(w.meaning?' ['+w.meaning+']':'')+': '+(w.example?w.example.substring(0,80):'');
      }else{
        div.innerHTML='<strong>'+w.word+'</strong> '+(w.reading?'('+w.reading+')':'')+': '+(w.meaning_cn||'');
      }
      wrongList.appendChild(div);
    });
  }else wrongCard.classList.add('hide');
}
function backToDashboard(){showView('dashboard');renderDashboard();}
document.addEventListener('DOMContentLoaded',function(){renderDashboard();if(window.speechSynthesis){initVoices();if('onvoiceschanged' in window.speechSynthesis)window.speechSynthesis.onvoiceschanged=initVoices;}});
</script>
